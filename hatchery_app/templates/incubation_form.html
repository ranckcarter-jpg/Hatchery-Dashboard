{% extends "layout.html" %}
{% block content %}
<div class="form-container">
    <h2>{{ action }} Incubation Batch</h2>
    <form method="POST">
        <div class="form-group">
            <label for="breed">Breed</label>
            <input type="text" name="breed" id="breed" required>
        </div>
        <div class="form-group">
            <label for="start_date">Start Date</label>
            <input type="date" name="start_date" id="start_date" required>
        </div>
        <div class="form-group">
            <label for="egg_count">Egg Count</label>
            <input type="number" name="egg_count" id="egg_count" min="1" required>
        </div>
        <div class="form-group">
            <label for="notes">Notes</label>
            <textarea name="notes" id="notes" rows="3"></textarea>
        </div>
        <p class="help-text">Expected hatch date will be automatically calculated (21 days).</p>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Start Incubation</button>
            <a href="{{ url_for('incubation') }}" class="btn">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
